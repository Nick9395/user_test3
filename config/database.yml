default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000
  checkout_timeout: 5
  host: db
  username: postgres
  password: password

development:
  <<: *default
  database: app_development

test:
  <<: *default
  database: app_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>

cache:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
  migrations_paths: db/cache_migrate

cable:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
  migrations_paths: db/cable_migrate

queue:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
  migrations_paths: db/queue_migrate
